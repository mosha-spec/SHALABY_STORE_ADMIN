<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - متجر شلبي</title>
    <!-- تضمين مكتبات الفايربيز الأساسية -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .file-upload { background: #eef2f7; border: 2px dashed #3498db; padding: 20px; text-align: center; border-radius: 6px; cursor: pointer; }
        .file-upload input { display: none; }
        .btn { width: 100%; padding: 14px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #27ae60; }
        .btn-edit { background: #f39c12; margin-top: 10px; }
        .btn-edit:hover { background: #d35400; }
        .product-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: #fafafa; border: 1px solid #ddd; margin-top: 10px; border-radius: 6px; }
        .product-img { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; }
        .actions button { padding: 6px 12px; margin-left: 5px; border: none; border-radius: 4px; cursor: pointer; }
        .edit-btn { background: #3498db; color: white; }
        .delete-btn { background: #e74c3c; color: white; }
        #progressContainer { display: none; margin-top: 10px; background: #ddd; border-radius: 4px; }
        #progressBar { width: 0%; height: 10px; background: #3498db; border-radius: 4px; text-align: center; color: white; font-size: 10px; line-height: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>إدارة منتجات المتجر</h2>
    
    <!-- فورم إضافة وتعديل المنتج -->
    <div id="productForm">
        <input type="hidden" id="productId"> <!-- حقل مخفي لحفظ ايدي المنتج عند التعديل -->
        
        <div class="form-group">
            <label>اسم المنتج:</label>
            <input type="text" id="productName" placeholder="مثال: تيشرت صيفي زيتي">
        </div>
        
        <div class="form-group">
            <label>السعر (جنيه):</label>
            <input type="number" id="productPrice" placeholder="مثال: 350">
        </div>
        
        <div class="form-group">
            <label>الوصف:</label>
            <textarea id="productDesc" rows="3" placeholder="اكتب تفاصيل المنتج هنا..."></textarea>
        </div>
        
        <div class="form-group">
            <label>صورة المنتج (اختر من المعرض مباشرة):</label>
            <div class="file-upload" onclick="document.getElementById('productImageFile').click()">
                <span id="uploadText">اضغط هنا لفتح الاستوديو واختيار صورة</span>
                <input type="file" id="productImageFile" accept="image/*">
            </div>
            <input type="hidden" id="productImageUrl"> <!-- لحفظ رابط الصورة المرفوعة -->
            
            <!-- شريط تقدم الرفع -->
            <div id="progressContainer">
                <div id="progressBar">0%</div>
            </div>
        </div>
        
        <button class="btn" id="saveBtn" onclick="saveProduct()">إضافة المنتج للمتجر</button>
    </div>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #ccc;">

    <h3>المنتجات المعروضة حالياً:</h3>
    <div id="productsList">
        <!-- المنتجات تظهر هنا تلقائياً -->
    </div>
</div>

<script>
    // 1. إعدادات الفايربيز الخاصة بك (ضع بيانات مشروعك هنا)
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "hsalaby-store.firebaseapp.com",
        databaseURL: "https://hsalaby-store-default-rtdb.firebaseio.com",
        projectId: "hsalaby-store",
        storageBucket: "hsalaby-store.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    
    // بدء تشغيل الفايربيز
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    // 2. مراقبة واختيار الصورة من المعرض ورفعها فوراً
    document.getElementById('productImageFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // إظهار شريط التحميل
        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('uploadText').innerText = "جاري رفع الصورة...";

        // إنشاء مسار فريد للصورة في السيرفر
        const storageRef = storage.ref('products/' + Date.now() + '_' + file.name);
        const uploadTask = storageRef.put(file);

        // متابعة عملية الرفع
        uploadTask.on('state_changed', function(snapshot) {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressBar').innerText = Math.round(progress) + '%';
        }, function(error) {
            alert("فشل رفع الصورة: " + error.message);
        }, function() {
            // عند اكتمال الرفع بنجاح، جلب رابط الصورة الحقيقي
            uploadTask.snapshot.ref.getDownloadURL().then(function(downloadURL) {
                document.getElementById('productImageUrl').value = downloadURL;
                document.getElementById('uploadText').innerText = "✅ تم اختيار الصورة ورفعها بنجاح!";
                document.getElementById('progressContainer').style.display = 'none';
            });
        });
    });

    // 3. حفظ أو تعديل المنتج
    function saveProduct() {
        const id = document.getElementById('productId').value;
        const name = document.getElementById('productName').value;
        const price = document.getElementById('productPrice').value;
        const desc = document.getElementById('productDesc').value;
        const imageUrl = document.getElementById('productImageUrl').value;

        if (!name || !price || !imageUrl) {
            alert("برجاء ملء الاسم، السعر، واختيار صورة!");
            return;
        }

        const productData = {
            name: name,
            price: price,
            desc: desc,
            image: imageUrl
        };

        if (id) {
            // إذا كان فيه ID، يعني بنعدل منتج موجود
            database.ref('products/' + id).update(productData).then(() => {
                alert("تم تعديل المنتج بنجاح!");
                resetForm();
            });
        } else {
            // إذا مفيش ID، يبقى ده منتج جديد تماماً
            database.ref('products').push(productData).then(() => {
                alert("تم إضافة المنتج الجديد للمتجر!");
                resetForm();
            });
        }
    }

    // 4. جلب المنتجات وعرضها في لوحة التحكم مع أزرار التعديل والحذف
    database.ref('products').on('value', function(snapshot) {
        const list = document.getElementById('productsList');
        list.innerHTML = '';
        
        snapshot.forEach(function(childSnapshot) {
            const id = childSnapshot.key;
            const data = childSnapshot.val();

            list.innerHTML += `
                <div class="product-item">
                    <img src="${data.image}" class="product-img">
                    <div>
                        <strong>${data.name}</strong> <br>
                        <span style="color: #2ecc71;">${data.price} جنيه</span>
                    </div>
                    <div class="actions">
                        <button class="edit-btn" onclick="editProduct('${id}', '${data.name}', '${data.price}', '${data.desc}', '${data.image}')">تعديل ✏️</button>
                        <button class="delete-btn" onclick="deleteProduct('${id}')">حذف ❌</button>
                    </div>
                </div>
            `;
        });
    });

    // 5. وظيفة زر التعديل (رفع البيانات للفورم فوق للتعديل في أي وقت)
    function editProduct(id, name, price, desc, imageUrl) {
        document.getElementById('productId').value = id;
        document.getElementById('productName').value = name;
        document.getElementById('productPrice').value = price;
        document.getElementById('productDesc').value = desc;
        document.getElementById('productImageUrl').value = imageUrl;
        
        document.getElementById('uploadText').innerText = "🔄 الصورة مرفوعة مسبقاً (يمكنك اختيار صورة أخرى)";
        document.getElementById('saveBtn').innerText = "حفظ التعديلات الحالية";
        document.getElementById('saveBtn').className = "btn btn-edit";
        
        // الصعود لأعلى الصفحة بسلاسة ليرى المستخدم الحقول
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // 6. حذف المنتج
    function deleteProduct(id) {
        if (confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) {
            database.ref('products/' + id).remove().then(() => {
                alert("تم حذف المنتج!");
            });
        }
    }

    // تفريغ الفورم بعد الحفظ أو التعديل
    function resetForm() {
        document.getElementById('productId').value = '';
        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productDesc').value = '';
        document.getElementById('productImageUrl').value = '';
        document.getElementById('productImageFile').value = '';
        document.getElementById('uploadText').innerText = "اضغط هنا لفتح الاستوديو واختيار صورة";
        document.getElementById('saveBtn').innerText = "إضافة المنتج للمتجر";
        document.getElementById('saveBtn').className = "btn";
    }
</script>

</body>
</html>
